<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Field Sampler" />
  <title>Field Sampler</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SCREEN: Home -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="app-logo">🌾</div>
      <h1>Field Sampler</h1>
      <p class="subtitle">Forage Sorghum · 2025</p>
    </div>
    <div class="home-actions">
      <button class="btn-primary" onclick="showScreen('screen-new-session')">+ New Sampling Session</button>
      <button class="btn-secondary" onclick="showScreen('screen-sessions')">View Past Sessions</button>
    </div>
    <div id="home-recent" class="recent-sessions"></div>
  </div>

  <!-- SCREEN: New Session -->
  <div id="screen-new-session" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← Back</button>
      <h2>New Session</h2>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="session-date" />
      </div>
      <div class="field-group">
        <label>Crop</label>
        <input type="text" id="session-crop" value="Forage Sorghum" />
      </div>
      <div class="field-group">
        <label>Year</label>
        <input type="number" id="session-year" value="2025" />
      </div>
      <div class="field-group">
        <label>Side</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="side-east" onclick="selectSide('East')">East</button>
          <button class="toggle-btn" id="side-west" onclick="selectSide('West')">West</button>
        </div>
      </div>
      <div class="field-group">
        <label>Session Type</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="type-weekly" onclick="selectSessionType('Weekly')">Weekly</button>
          <button class="toggle-btn" id="type-harvest" onclick="selectSessionType('Harvest')">Harvest</button>
        </div>
      </div>
      <div id="harvest-bag-weights" style="display:none;flex-direction:column;gap:14px;">
        <div class="form-section-title">BAG WEIGHTS (reference — enter once per session)</div>
        <div class="field-group">
          <label>Zip Lock Bag Weight (g)</label>
          <input type="number" inputmode="decimal" id="bag-ziplock" placeholder="e.g. 8.55" />
        </div>
        <div class="field-group">
          <label>Purple Bag Weight (g)</label>
          <input type="number" inputmode="decimal" id="bag-purple" placeholder="e.g. 19.1" />
        </div>
        <div class="field-group">
          <label>Brown Paper Bag Avg Weight (g)</label>
          <input type="number" inputmode="decimal" id="bag-brown" placeholder="e.g. 59.56" />
        </div>
      </div>
      <div class="field-group">
        <label>Technician</label>
        <input type="text" id="session-tech" placeholder="Your name" />
      </div>
    </div>
    <div class="screen-footer">
      <button class="btn-primary" onclick="startSession()">Start Session →</button>
    </div>
  </div>

  <!-- SCREEN: Session Menu -->
  <div id="screen-session-menu" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← Home</button>
      <h2 id="session-menu-title">Session</h2>
    </div>
    <div class="session-info-bar" id="session-info-bar"></div>
    <div class="session-scroll">
      <!-- Weekly sections -->
      <div id="weekly-sections">
        <div class="section-label">DESTRUCTIVE SAMPLES</div>
        <div id="plot-list" class="plot-list"></div>
        <div class="section-label">REFERENCE ROWS</div>
        <div id="ref-list" class="plot-list"></div>
        <div class="section-label">LYSIMETER BOXES</div>
        <div id="lys-list" class="plot-list"></div>
      </div>
      <!-- Harvest section -->
      <div id="harvest-section" style="display:none;">
        <div class="section-label">HARVEST DATA</div>
        <div id="harvest-list" class="plot-list"></div>
      </div>
    </div>
    <div class="screen-footer">
      <button class="btn-secondary" onclick="showScreen('screen-sessions')">Save & Exit</button>
      <button class="btn-primary" onclick="exportSession()">Export Excel</button>
    </div>
  </div>

  <!-- SCREEN: Field/Lab Entry -->
  <div id="screen-field-entry" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="backToSessionMenu()">← Back</button>
      <h2 id="field-entry-title">Plot</h2>
      <span id="field-entry-badge" class="badge"></span>
    </div>
    <div class="form-body" id="field-entry-form"></div>
    <div class="screen-footer">
      <button class="btn-primary" onclick="saveFieldEntry()">Save →</button>
    </div>
  </div>

  <!-- SCREEN: Harvest Entry -->
  <div id="screen-harvest-entry" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="backToSessionMenu()">← Back</button>
      <h2 id="harvest-entry-title">Harvest</h2>
      <span class="badge" style="background:#fdecea;color:#c0392b;">HARVEST</span>
    </div>
    <div class="form-body" id="harvest-entry-form"></div>
    <div class="screen-footer">
      <button class="btn-primary" onclick="saveHarvestEntry()">Save →</button>
    </div>
  </div>

  <!-- SCREEN: Drying Log -->
  <div id="screen-drying-log" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="backToSessionMenu()">← Back</button>
      <h2>Drying Log</h2>
      <span class="badge" style="background:#fdecea;color:#c0392b;">HARVEST</span>
    </div>
    <div class="session-info-bar" id="drying-info-bar"></div>
    <div class="session-scroll" id="drying-log-content"></div>
    <div class="screen-footer">
      <button class="btn-primary" onclick="backToSessionMenu()">Done</button>
    </div>
  </div>

  <!-- SCREEN: Past Sessions -->
  <div id="screen-sessions" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← Back</button>
      <h2>Past Sessions</h2>
    </div>
    <div id="sessions-list" class="sessions-list"></div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
